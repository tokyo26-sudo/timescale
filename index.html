<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@300;400;700;900&display=swap');
:root{
  --bg:#07111F;--panel:#0D1E30;--amber:#F5A623;
  --cyan:#3ECFCF;--white:#EEF2F7;--muted:#4A6080;--rail:#1E3A5A;
  --green:#4CE88A;--red:#FF5F5F;
  --font-mono:'Share Tech Mono',monospace;--font-body:'Noto Sans JP',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--white);font-family:var(--font-body);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{padding:9px 15px 7px;border-bottom:1px solid var(--rail);display:flex;align-items:center;gap:9px;flex-shrink:0;}
header h1{font-size:.88rem;font-weight:900;letter-spacing:.12em;color:var(--amber);font-family:var(--font-mono);}
.ver{margin-left:auto;font-size:.56rem;font-family:var(--font-mono);color:var(--muted);opacity:.6;}
.main-wrap{display:flex;flex:1;overflow:hidden;}

/* サイドパネル */
.side-panel{width:262px;min-width:232px;background:var(--panel);border-right:1px solid var(--rail);
  display:flex;flex-direction:column;overflow-y:auto;padding:10px 11px;gap:10px;flex-shrink:0;}
.side-panel.collapsed{display:none;}
.sec-label{font-size:.54rem;font-family:var(--font-mono);color:var(--muted);letter-spacing:.16em;
  text-transform:uppercase;margin-bottom:4px;}

/* 路線リスト */
.route-list{display:flex;flex-direction:column;gap:3px;}
.route-btn{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:4px;
  border:1px solid var(--rail);background:transparent;color:var(--muted);
  font-family:var(--font-mono);font-size:.7rem;cursor:pointer;text-align:left;width:100%;transition:all .13s;}
.route-btn:hover{background:var(--rail);}
.route-btn.sel{color:var(--white);}
.route-swatch{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.route-range{font-size:.55rem;opacity:.45;margin-left:auto;}

/* インプット */
select,input[type="number"],input[type="text"]{background:var(--bg);border:1px solid var(--rail);
  color:var(--white);font-family:var(--font-mono);font-size:.72rem;padding:5px 6px;
  border-radius:4px;width:100%;outline:none;}
select:focus,input:focus{border-color:var(--amber);}
.sel-row{display:flex;align-items:center;gap:5px;}
.sel-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.swap-btn{background:transparent;border:1px solid var(--rail);color:var(--muted);
  font-size:.75rem;padding:3px 7px;border-radius:3px;cursor:pointer;transition:all .13s;white-space:nowrap;}
.swap-btn:hover{border-color:var(--amber);color:var(--amber);}
.year-row{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.year-field label{font-size:.54rem;font-family:var(--font-mono);color:var(--muted);display:block;margin-bottom:2px;}

/* 和暦 */
.wareki-row{display:flex;gap:3px;}
.wr-btn{flex:1;background:transparent;border:1px solid var(--rail);color:var(--muted);
  font-family:var(--font-mono);font-size:.58rem;padding:4px 0;border-radius:3px;cursor:pointer;transition:all .12s;}
.wr-btn:hover{border-color:var(--amber);}
.wr-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(62,207,207,.08);}

.btn-primary{background:var(--amber);color:var(--bg);font-family:var(--font-mono);font-size:.76rem;
  font-weight:bold;letter-spacing:.07em;border:none;padding:8px;border-radius:4px;cursor:pointer;width:100%;transition:opacity .13s;}
.btn-primary:hover{opacity:.85;}
.btn-sm-row{display:flex;gap:5px;}
.btn-sm{flex:1;background:var(--rail);color:var(--white);font-family:var(--font-mono);font-size:.66rem;
  border:1px solid var(--muted);padding:6px 0;border-radius:4px;cursor:pointer;transition:all .12s;text-align:center;}
.btn-sm:hover{border-color:var(--amber);color:var(--amber);}
.status-msg{font-size:.62rem;font-family:var(--font-mono);color:var(--cyan);min-height:1em;line-height:1.4;}
.status-msg.err{color:var(--red);}

/* トピック */
.topic-list{display:flex;flex-direction:column;gap:3px;max-height:100px;overflow-y:auto;}
.topic-item{display:flex;align-items:center;gap:4px;background:var(--bg);border:1px solid var(--rail);
  border-radius:3px;padding:3px 5px;font-size:.63rem;font-family:var(--font-mono);}
.topic-age{color:var(--amber);min-width:26px;flex-shrink:0;}
.topic-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.topic-del{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:.7rem;padding:0 2px;flex-shrink:0;}
.topic-del:hover{color:var(--red);}
.topic-add-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.topic-add-row input,.topic-add-row select{font-size:.8rem;padding:7px 8px;}  /* 大きめ・たかめで打ちやすく */
.topic-yr-row{display:flex;gap:5px;flex:1 1 100%;}            /* 西れき年＋月で1行 */
.topic-yr-row .topic-age-in{flex:1 1 auto;width:auto!important;} /* 年が広く */
.topic-month-in{flex:0 0 auto;width:88px;}                   /* 月は固有幅（select{width:100%}継承を打消し）*/
.topic-add-row #topicText{flex:1 1 0;min-width:0;}           /* できごとは次の行で残り幅いっぱい */
.topic-add-btn{background:var(--rail);border:1px solid var(--muted);color:var(--white);border-radius:4px;
  padding:7px 11px;cursor:pointer;font-size:.74rem;white-space:nowrap;transition:all .12s;flex-shrink:0;}
.topic-add-btn:hover{background:var(--amber);color:var(--bg);border-color:var(--amber);}
.topic-bubble{background:#0D1E30EE;border:1px solid var(--amber);border-radius:6px;padding:3px 7px;
  font-size:.68rem;color:#EEF2F7;max-width:160px;white-space:normal;line-height:1.3;
  box-shadow:0 2px 6px rgba(0,0,0,.5);pointer-events:none;}
.topic-bubble b{color:var(--amber);display:block;margin-bottom:1px;font-size:.62rem;}
.topic-tooltip{background:#0D1E30EE!important;border:1px solid var(--amber)!important;min-width:130px!important;
  color:#EEF2F7!important;border-radius:6px!important;box-shadow:0 2px 6px rgba(0,0,0,.6)!important;}
.topic-tooltip::before{border-top-color:var(--amber)!important;}
.leaflet-tooltip-top.topic-tooltip::before{border-top-color:#F5A623!important;}

/* 駅リスト */
.station-list{display:flex;flex-direction:column;max-height:140px;overflow-y:auto;}
.sli{display:flex;align-items:center;gap:5px;padding:3px 2px;font-size:.62rem;font-family:var(--font-mono);
  cursor:pointer;border-radius:2px;transition:background .1s;}
.sli:hover{background:var(--rail);}
.sli.cur{color:var(--amber);}
.sli-dot{width:4px;height:4px;border-radius:50%;background:var(--muted);flex-shrink:0;}
.sli.cur .sli-dot{background:var(--amber);box-shadow:0 0 3px var(--amber);}
.sli-yr{color:var(--muted);margin-left:auto;font-size:.58rem;}
hr.div{border:none;border-top:1px solid var(--rail);margin:0;}

/* 地図コンテナ */
.map-wrap{flex:1;position:relative;overflow:hidden;}
#map{width:100%;height:100%;}

/* 地図上スライダーオーバーレイ */
.map-overlay{position:absolute;bottom:0;left:0;right:0;z-index:9999;
  background:linear-gradient(transparent,rgba(7,17,31,.92) 30%);
  padding:10px 18px 14px;pointer-events:none;}
.map-overlay>*{pointer-events:auto;}
.overlay-top{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.ov-age{font-size:1.7rem;font-family:var(--font-mono);color:var(--amber);line-height:1;}
.ov-year{font-size:.75rem;font-family:var(--font-mono);color:var(--cyan);}
.ov-station{font-size:.8rem;font-weight:700;margin-left:auto;text-align:right;}
.ov-sub{font-size:.58rem;font-family:var(--font-mono);color:var(--muted);text-align:right;}
.ov-prog-wrap{background:rgba(30,58,90,.6);height:3px;border-radius:2px;overflow:hidden;margin-bottom:6px;}
.ov-prog-fill{height:100%;transition:width .12s;}
.ov-slider{-webkit-appearance:none;width:100%;height:5px;background:rgba(30,58,90,.8);
  border-radius:3px;outline:none;cursor:pointer;}
.ov-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;
  background:var(--amber);box-shadow:0 0 8px var(--amber);cursor:grab;}
.ov-slider::-webkit-slider-thumb:active{cursor:grabbing;}
.ov-controls{display:flex;align-items:center;gap:8px;margin-top:6px;}
.ov-btn{background:rgba(13,30,48,.85);border:1px solid var(--rail);color:var(--muted);
  font-family:var(--font-mono);font-size:.66rem;padding:5px 12px;border-radius:4px;
  cursor:pointer;transition:all .13s;}
.ov-btn:hover,.ov-btn.active{border-color:var(--amber);color:var(--amber);}
.speed-row{display:flex;align-items:center;gap:5px;font-size:.58rem;font-family:var(--font-mono);color:var(--muted);margin-left:auto;}
.speed-row input[type="range"]{width:70px;height:3px;background:rgba(30,58,90,.8);}
.speed-row input[type="range"]::-webkit-slider-thumb{width:11px;height:11px;}

/* カスタムマーカ */
.age-marker-wrap{display:flex;flex-direction:column;align-items:center;cursor:grab;}
.age-marker-wrap:active{cursor:grabbing;}
.age-marker-circle{border-radius:50%;border:2.5px solid #fff;display:flex;align-items:center;justify-content:center;
  font-family:'Share Tech Mono',monospace;font-weight:bold;color:#07111F;animation:pulse 1.4s infinite;
  user-select:none;white-space:nowrap;overflow:visible;}
.age-marker-label{font-family:'Share Tech Mono',monospace;font-size:10px;font-weight:bold;
  color:#fff;text-shadow:0 0 4px #000,0 0 4px #000;margin-top:1px;white-space:nowrap;user-select:none;}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(245,166,35,.75);}
  70%{box-shadow:0 0 0 13px rgba(245,166,35,0);}
  100%{box-shadow:0 0 0 0 rgba(245,166,35,0);}
}
.leaflet-popup-content-wrapper{background:#0D1E30;border:1px solid #F5A623;color:#EEF2F7;border-radius:6px;}
.leaflet-popup-tip{background:#F5A623;}
.tile-menu-wrap{position:absolute;top:80px;right:10px;z-index:9999;}
.tile-menu-btn{background:#0D1E30CC;border:1px solid #555;border-radius:6px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:#EEF2F7;}
.tile-menu-btn:hover{border-color:#F5A623;color:#F5A623;}
.tile-menu-list{display:none;position:absolute;right:0;top:36px;background:#0D1E30EE;border:1px solid #555;border-radius:6px;overflow:hidden;min-width:140px;}
.tile-menu-list.open{display:block;}
.tile-menu-list button{display:block;width:100%;padding:7px 12px;background:none;border:none;color:#EEF2F7;font-size:.75rem;text-align:left;cursor:pointer;white-space:nowrap;}
.tile-menu-list button:hover{background:#1E3A5F;color:#F5A623;}
.tile-menu-list button.active{color:#F5A623;}

.leaflet-popup-content{font-family:'Share Tech Mono',monospace;font-size:.7rem;margin:7px 9px;}
.leaflet-tile{} .tile-dark{filter:brightness(.62) saturate(.45) hue-rotate(200deg);}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--rail);}
</style>
</head>
<body>
<header>
  <button onclick="toggleSidebar()" id="btnSidebar" title="メニューを隠す/表示" style="font-size:.8rem;padding:2px 8px;background:transparent;border:1px solid var(--rail);color:var(--muted);border-radius:4px;cursor:pointer;">◀</button>
  <h1>◉ タイムスケール路線図</h1>
  <span style="font-size:.64rem;color:var(--muted)">TIMESCALE SHINKANSEN</span>
  <label style="cursor:pointer;font-size:.65rem;padding:3px 8px;background:transparent;border:1px solid var(--rail);color:var(--muted);border-radius:4px;white-space:nowrap;">📂 JSONデータ読込み<input type="file" accept=".json" style="display:none" onchange="loadJSON(event)"/></label>
  <button onclick="shareURL()" style="font-size:.65rem;padding:3px 8px;background:transparent;border:1px solid #4a90d6;color:#4a90d6;border-radius:4px;cursor:pointer;white-space:nowrap;">🔗 URLで共有</button>
  <button onclick="resetAll()" style="font-size:.65rem;padding:3px 8px;background:transparent;border:1px solid #e55;color:#e55;border-radius:4px;cursor:pointer;white-space:nowrap;">🗑 リセット</button>
  <span class="ver">v2.55</span>
</header>
<div class="main-wrap">
  <!-- サイドパネル -->
  <div class="side-panel" id="sidePanel">

    <div>
      <div class="sec-label">① 新幹線を選ぶ</div>
      <div class="route-list" id="routeList"></div>
    </div>

    <hr class="div">

    <div id="terminalSection" style="display:none">
      <div class="sec-label">② 始発・終着</div>
      <div style="display:flex;flex-direction:column;gap:5px">
        <div class="sel-row">
          <div class="sel-dot" id="dotStart" style="background:var(--green);box-shadow:0 0 5px var(--green)"></div>
          <select id="startSel"></select>
        </div>
        <div style="display:flex;justify-content:center">
          <button class="swap-btn" onclick="swapTerminals()">⇅ 入れかえ</button>
        </div>
        <div class="sel-row">
          <div class="sel-dot" id="dotEnd" style="background:var(--red);box-shadow:0 0 5px var(--red)"></div>
          <select id="endSel"></select>
        </div>
      </div>
    </div>

    <div id="yearSection" style="display:none">
      <div class="sec-label">③ 始まりと終わり</div>
      <div style="display:flex;flex-direction:column;gap:5px">
        <div class="year-field"><label>🟢 始まり</label>
          <div style="display:flex;gap:4px">
            <input type="text" id="birthYear" value="1900" placeholder="例: -500, 138億" style="flex:2" onblur="normalizeYearField(this)"/>
            <select id="birthMonth" style="flex:1"><option value="0">──月</option></select>
          </div>
        </div>
        <div class="year-field"><label>🔴 終わり</label>

// ===== 大きい数：入力パース＆表示 =====
let bigYearJp=false; // 地球スケールの表示: false=そのまま(カンマ), true=億・万表記

// 日本語の数（億・万・千・小数・「年前」など）→ 数値 に変換
// 例: "-138億"→-13800000000, "13.8億"→1380000000, "138億3400万"→13834000000
function parseJpNumber(raw){
  if(raw==null) return NaN;
  let s=String(raw).trim();
  if(s==='') return NaN;
  // 全角→半角、記号の正規化
  s=s.replace(/[０-９]/g,d=>String.fromCharCode(d.charCodeAt(0)-0xFEE0))
     .replace(/[．]/g,'.').replace(/[，、,\s]/g,'').replace(/[ー－―‐−]/g,'-');
  // 「年前/前」→マイナス、「年後/後/年」は除去
  let sign=1;
  if(/(年前|前)$/.test(s)){ sign=-1; s=s.replace(/(年前|前)$/,''); }
  else { s=s.replace(/(年後|後|年)$/,''); }
  if(s[0]==='-'){ sign=-sign; s=s.slice(1); }
  else if(s[0]==='+'){ s=s.slice(1); }
  if(s==='') return NaN;
  if(/^[0-9]+(\.[0-9]+)?$/.test(s)) return sign*parseFloat(s); // 純粋な数値
  // 大単位（降順）。※京(10^16)から上はJSの精度限界を超えるので参考程度
  const BIG=[['無量大数',1e68],['不可思議',1e64],['那由他',1e60],['阿僧祇',1e56],['恒河沙',1e52],
    ['極',1e48],['載',1e44],['正',1e40],['澗',1e36],['溝',1e32],['穣',1e28],['秭',1e24],['𥝱',1e24],
    ['垓',1e20],['京',1e16],['兆',1e12],['億',1e8],['万',1e4]];
  const SMALL=[['千',1e3],['百',1e2],['十',1e1]];
  function parseSmall(str){
    str=str.trim();
    if(str==='') return 1;
    if(/^[0-9]+(\.[0-9]+)?$/.test(str)) return parseFloat(str);
    let t=0, r=str;
    for(const [nm,v] of SMALL){
      const i=r.indexOf(nm);
      if(i>=0){ const h=r.slice(0,i); r=r.slice(i+nm.length); t+=(h===''?1:parseFloat(h))*v; }
    }
    if(r!==''){ const n=parseFloat(r); if(!isNaN(n)) t+=n; }
    return t;
  }
  let total=0, rest=s, matched=false;
  for(const [nm,v] of BIG){
    const i=rest.indexOf(nm);
    if(i>=0){ const h=rest.slice(0,i); rest=rest.slice(i+nm.length); total+=parseSmall(h)*v; matched=true; }
  }
  if(rest!=='') total+=parseSmall(rest);
  if(!matched && total===0) return NaN;
  return sign*total;
}

// 数値 → 億・万 表記（例: 13834000000 → "138億3400万", 1380000000 → "13億8000万"）
function toJpUnits(n){
  n=Math.round(n);
  if(n===0) return '0';
  const neg=n<0; n=Math.abs(n);
  const BIG=[['無量大数',1e68],['不可思議',1e64],['那由他',1e60],['阿僧祇',1e56],['恒河沙',1e52],
    ['極',1e48],['載',1e44],['正',1e40],['澗',1e36],['溝',1e32],['穣',1e28],['秭',1e24],
    ['垓',1e20],['京',1e16],['兆',1e12],['億',1e8],['万',1e4]];
  let parts='', rest=n;
  for(const [nm,v] of BIG){
    if(rest>=v){ const q=Math.floor(rest/v); rest-=q*v; parts+=q+nm; }
  }
  if(rest>0) parts+=String(rest);
  return (neg?'-':'')+(parts||'0');
}

function fmtBigNum(n){ n=Math.round(n); return bigYearJp ? toJpUnits(n) : n.toLocaleString(); }

function fmtYear(y){
  if(scaleMode==='earth'){           // 地球スケールは億表記トグルに従う
    if(y<0){
      const a=Math.abs(y);
      if(a<=9999) return '紀元前'+a+'年';   // -1〜-9999 は「紀元前◯年」
      return fmtBigNum(a)+'年前';            // -10000 より前は「◯年前」（億・万トグル対応）
    }
    return fmtBigNum(y)+'年';
  }
  if(dateMode==='seireki') return y+'年';
  if(dateMode==='wareki')  return toWareki(y);
  return y+'年（'+toWareki(y)+'）';
}

// ===== 距離 =====
function dist(a,b){
  const R=6371,dLat=(b.lat-a.lat)*Math.PI/180,dLon=(b.lon-a.lon)*Math.PI/180;
  const aa=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(aa),Math.sqrt(1-aa));
}

// 路線上の最近傍点（ラットロン→ratio）
function latLonToRatio(lat, lon) {
  // ポリラインがあればポリライン上の最近傍点でratioを計算
  if(routePolyCoords.length>0){
    let best = {ratio:0, d:Infinity};
    const total=routePolyCumDist[routePolyCumDist.length-1];
    for(let i=0;i<routePolyCoords.length-1;i++){
      const a=routePolyCoords[i], b=routePolyCoords[i+1];
      const dx=b[1]-a[1], dy=b[0]-a[0];
      const lenSq=dx*dx+dy*dy;
      let t=0;
      if(lenSq>0) t=Math.max(0,Math.min(1,((lon-a[1])*dx+(lat-a[0])*dy)/lenSq));
      const pLat=a[0]+t*dy, pLon=a[1]+t*dx;
      const d=Math.hypot(lat-pLat,lon-pLon);
      if(d<best.d){
        const segStart=routePolyCumDist[i]/total;
        const segEnd=routePolyCumDist[i+1]/total;
        best={ratio:segStart+t*(segEnd-segStart),d};
      }
    }
    return Math.max(0,Math.min(1,best.ratio));
  }
  // フォールバック（駅間直線）
  let best = {ratio:0, d:Infinity};
  for(let i=0;i<stations.length-1;i++){
    const a=stations[i], b=stations[i+1];
    const dx=b.lon-a.lon, dy=b.lat-a.lat;
    const lenSq=dx*dx+dy*dy;
    let t=0;
    if(lenSq>0) t=Math.max(0,Math.min(1,((lon-a.lon)*dx+(lat-a.lat)*dy)/lenSq));
    const pLat=a.lat+t*dy, pLon=a.lon+t*dx;
    const d=dist({lat,lon},{lat:pLat,lon:pLon});
    if(d<best.d){
      const segStartRatio=a.cumDist/totalDist;
      const segEndRatio=b.cumDist/totalDist;
      best={ratio:segStartRatio+t*(segEndRatio-segStartRatio), d};
    }
  }
  return Math.max(0,Math.min(1,best.ratio));
}

// routePolyCoords: 現在表示中の路線のポリライン座標列
let routePolyCoords = [];
let routePolyCumDist = []; // ポリライン上の累積距離

function buildPolyIndex(latlngs){
  routePolyCoords = latlngs;
  routePolyCumDist = [0];
  for(let i=1;i<latlngs.length;i++){
    const d = Math.hypot(latlngs[i][0]-latlngs[i-1][0], latlngs[i][1]-latlngs[i-1][1]);
    routePolyCumDist.push(routePolyCumDist[i-1]+d);
  }
}

// ratio(0〜1)→ポリライン上の座標
function ratioToPolyPos(ratio){
  if(!routePolyCoords.length) return null;
  const total = routePolyCumDist[routePolyCumDist.length-1];
  const target = ratio * total;
  let lo=0, hi=routePolyCoords.length-1;
  while(lo<hi-1){
    const mid=Math.floor((lo+hi)/2);
    if(routePolyCumDist[mid]<=target) lo=mid; else hi=mid;
  }
  const t=(target-routePolyCumDist[lo])/(routePolyCumDist[hi]-routePolyCumDist[lo]||1);
  return [
    routePolyCoords[lo][0]+t*(routePolyCoords[hi][0]-routePolyCoords[lo][0]),
    routePolyCoords[lo][1]+t*(routePolyCoords[hi][1]-routePolyCoords[lo][1])
  ];
}

function getPosAtRatio(ratio){
  // ポリラインデータがあればポリライン上の正確な位置を返す
  const polyPos = ratioToPolyPos(ratio);
  // niは最近傍駅のインデックス（表示用）
  const curDist=ratio*totalDist;
  let ni=0;
  for(let i=0;i<stations.length-1;i++){if(stations[i].cumDist<=curDist)ni=i;}
  if(polyPos) return{lat:polyPos[0],lon:polyPos[1],ni};
  // フォールバック（ポリラインなし）
  const s=stations[ni],sn=stations[ni+1]||s;
  const segD=sn.cumDist-s.cumDist;
  if(segD<=0)return{lat:s.lat,lon:s.lon,ni};
  const t=(curDist-s.cumDist)/segD;
  return{lat:s.lat+t*(sn.lat-s.lat),lon:s.lon+t*(sn.lon-s.lon),ni};
}

// ===== 始まり・終わりを「月」で取得 =====
// 人スケール: 年×12 + 月-1 (総月数)
// 地球スケール: 年のまま（整数）
// getStartVal/getEndVal → 常に「西れき年（実数）」を返スル
function getStartVal(){
  const v = parseJpNumber(document.getElementById('birthYear').value); const y = isNaN(v) ? 0 : v;
  if(scaleMode==='earth') return y;
  const m = parseInt(document.getElementById('birthMonth').value)||1;
  return y + (m-1)/12;
}
function getEndVal(){
  const v = parseJpNumber(document.getElementById('deathYear').value); const y = isNaN(v) ? 0 : v;
  if(scaleMode==='earth') return y;
  const m = parseInt(document.getElementById('deathMonth').value)||1;
  return y + (m-1)/12;
}
// 西れき年（実数）→スライダ値（人=月数整数、地球=年数整数）
function yearToSteps(yearReal, birthYearReal){
  const diff = yearReal - birthYearReal;
  return scaleMode==='human' ? Math.round(diff*12) : Math.round(diff);
}
// スライダ値→西れき年（実数）
function stepsToYear(steps, birthYearReal){
  return scaleMode==='human' ? birthYearReal + steps/12 : birthYearReal + steps;
}
// 総月数（人）or 総年数（地球）を年に換算
function spanToYears(span){
  return scaleMode==='human' ? span/12 : span;
}
// 値→表示文字列
// valToLabel: 西れき年（実数）を表示文字列に変換
function valToLabel(yearReal){
  if(scaleMode==='earth'){
    return fmtYear(Math.round(yearReal));   // fmtYearが「年前/年」＋億表記を処理
  }
  // 人スケール：西れき年（実数）→ 年・月表示
  const yr = Math.floor(yearReal);
  const mo = Math.round((yearReal - yr)*12) + 1;
  if(mo<=1) return fmtYear(yr);
  return fmtYear(yr) + ` ${mo}月`;
}
// 値→年れいラベル（スライダ上の表示）
function valToAgeLabel(steps){
  // stepsは「スライダの値」= 経過月数（人）or 経過年数（地球）
  if(scaleMode==='earth') return fmtBigNum(steps);
  const y=Math.floor(steps/12);
  return `${y}`;
}

// CSVよみこみ（西れき年,コメント）
function loadTopicCSV(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split(/\r?\n/).filter(l=>l.trim());
    let count=0;
    lines.forEach(line=>{
      const parts=line.split(',');
      if(parts.length<2)return;
      const yr=parseInt(parts[0]);
      const text=parts.slice(1).join(',').trim().replace(/^["']|["']$/g,'');
      if(isNaN(yr)||!text)return;
      topics.push({year:yr,month:0,text});
      count++;
    });
    topics.sort((a,b)=>topicYearVal(a)-topicYearVal(b));
    renderTopicList();
    if(stations.length>0)redrawTopicMarkers();
    setStatus(`${count}件のトピックをよみこんだヨ！`,false);
  };
  reader.readAsText(file);
  event.target.value='';
}

function redrawTopicMarkers(){
  topicMarkers.forEach(e=>{try{map.removeLayer(e.marker||e);}catch(e){}});topicMarkers=[];
  const birthYear=getStartVal(), deathYear=getEndVal();
  const col=selectedRoute.color;

  // ① 表示するトピックを集めて、画面上のピクセル位置を計算
  const visible=[];
  topics.forEach((t,ti)=>{
    const ey=topicYearVal(t);   // 年＋月（月なしなら年そのまま）
    if(ey<birthYear||ey>deathYear)return;
    const ratio=(ey-birthYear)/(deathYear-birthYear);
    const pos=getPosAtRatio(ratio);
    if(!pos)return;
    visible.push({t,ti,pos,pt:map.latLngToContainerPoint([pos.lat,pos.lon]),stack:0});
  });

  // ② 近い吹き出し同士をタテに積む（重なりよけ）。年月の古い順で下から積む
  visible.sort((a,b)=>topicYearVal(a.t)-topicYearVal(b.t));
  const CLUSTER_PX=30;   // これより近いと「重なってる」とみなす（ズームすると離れて解消）
  for(let i=0;i<visible.length;i++){
    let lv=0;
    for(let j=0;j<i;j++){
      const dx=visible[i].pt.x-visible[j].pt.x, dy=visible[i].pt.y-visible[j].pt.y;
      if(Math.sqrt(dx*dx+dy*dy)<CLUSTER_PX) lv=Math.max(lv, visible[j].stack+1);
    }
    visible[i].stack=lv;
  }

  // ③ 描画
  const STACK_STEP=50;   // 1段ぶん上にずらす高さ(px)
  visible.forEach(v=>{
    const t=v.t, ti=v.ti, pos=v.pos;
    // 点マーカー
    const dotIcon=L.divIcon({className:'',
      html:'<div style="background:'+col+';border:2px solid #fff;border-radius:50%;width:10px;height:10px;box-shadow:0 0 5px rgba(0,0,0,.7)"></div>',
      iconSize:[10,10],iconAnchor:[5,5]});
    const m=L.marker([pos.lat,pos.lon],{icon:dotIcon,interactive:false}).addTo(map);

    if(bubbleVisible){
      // 積み重なってる分だけずらして表示（重なりよけ）
      // 上下モード=上へタテ積み / 右モード=右に出して近接ぶんだけタテにずらす（線は左に見える）
      let tipDir, tipOff;
      if(bubbleSide==='right'){
        tipDir='right';
        tipOff=[8, -v.stack*STACK_STEP];
      }else{
        tipDir='top';
        tipOff=[0, -8 - v.stack*STACK_STEP];
      }
      m.bindTooltip(
        '<div style="font-size:.68rem;line-height:1.4;min-width:130px;max-width:160px;white-space:normal;">'
        +'<span style="color:'+col+';display:block;font-size:.62rem;margin-bottom:2px">'+fmtTopicLabel(t)+'</span>'
        +t.text+'</div>',
        {permanent:true, direction:tipDir, className:'topic-tooltip', offset:tipOff, interactive:true}
      );
      m.openTooltip();
      // 吹き出しのDOMを取得して「クリックで最前面」を仕込む
      const tipEl=m.getTooltip()&&m.getTooltip().getElement();
      if(tipEl){
        tipEl.style.cursor='pointer';
        tipEl.style.pointerEvents='auto';   // ← クリックを確実に受け取る
        // 既定は下の段ほど手前（端が重なっても各段の年が見える）。クリック済みなら最前面を維持
        tipEl.style.zIndex = (topicZOrder[ti]!=null) ? topicZOrder[ti] : (700 - v.stack);
        tipEl.addEventListener('click',function(ev){
          ev.stopPropagation();
          topicZOrder[ti]=(++topicTopZ); // 覚えておく（再描画後も維持）
          tipEl.style.zIndex=topicZOrder[ti];
        });
      }
    }
    topicMarkers.push({marker:m, year:t.year});
  });
}

// ===== 人生を描く =====
function drawLife(){
  if(!selectedRoute){setStatus('先に路線を選んでネ！',true);return;}
  const birthYear=getStartVal();
  const deathYear=getEndVal();
  let si=parseInt(document.getElementById('startSel').value);
  let ei=parseInt(document.getElementById('endSel').value);
  if(birthYear>=deathYear){setStatus('生まれた年 < なくなた年 にしてネ！',true);return;}
  if(si===ei){setStatus('始発と終着は別の駅にしてネ！',true);return;}
  const dispSi=si,dispEi=ei;
  if(si>ei)[si,ei]=[ei,si];
  let seg=selectedRoute.stations.slice(si,ei+1);
  if(dispSi>dispEi)seg=[...seg].reverse();

  // 営業キロベースでcumDistを計算
  const baseKm = seg[0].km ?? 0;
  const hasKm = seg.every(s => s.km != null);
  stations=[];
  for(let i=0;i<seg.length;i++){
    const s=seg[i];
    let cum;
    if(hasKm){
      cum = s.km - baseKm;
    } else {
      cum = i===0 ? 0 : stations[i-1].cumDist + dist(seg[i-1],s);
    }
    stations.push({name:s.name,lat:s.lat,lon:s.lon,cumDist:cum});
  }
  totalDist=stations[stations.length-1].cumDist;
  // birthYear/deathYearは西れき年（実数）
  const lifeSpan=deathYear-birthYear; // 年単位
  stations.forEach(s=>{s.year=birthYear+(s.cumDist/totalDist)*lifeSpan;});

  clearMap();
  const col=selectedRoute.color;
  // 実線形データがあればそれを使う、なければ駅座標を直線でつなぐ
  const rawPoly = ROUTE_POLYLINES[selectedRoute.id];
  let ll;
  if(rawPoly){
    // 駅順（reversed関係なく、インデックス小→大の順）の始発・終着座標でクリップ
    const fwdStart=[seg[0].lat,seg[0].lon];
    const fwdEnd=[seg[seg.length-1].lat,seg[seg.length-1].lon];
    const nearIdx=(target)=>rawPoly.reduce((best,pt,i)=>{
      const d=Math.hypot(pt[0]-target[0],pt[1]-target[1]);
      return d<best.d?{i,d}:best;
    },{i:0,d:Infinity}).i;
    let pi=nearIdx(fwdStart), pj=nearIdx(fwdEnd);
    if(pi>pj)[pi,pj]=[pj,pi];
    ll=rawPoly.slice(pi,pj+1);
    // reversedのときはポリラインを逆順にする
    if(reversed) ll=[...ll].reverse();
    // 始発・終着の駅座標を先頭・末尾に入れる（ズレ補正）
    const startLL=[stations[0].lat,stations[0].lon];
    const endLL=[stations[stations.length-1].lat,stations[stations.length-1].lon];
    ll=[startLL,...ll.slice(1,ll.length-1),endLL];
  } else {
    ll=stations.map(s=>[s.lat,s.lon]);
  }
  routeLine=L.polyline(ll,{color:col,weight:4,opacity:.85}).addTo(map);
  stations.forEach((s,i)=>{
    const isEnd=i===0||i===stations.length-1;
    const sc=reversed?'#FF5F5F':'#4CE88A', ec=reversed?'#4CE88A':'#FF5F5F';
    const c=L.circleMarker([s.lat,s.lon],{
      radius:isEnd?7:4,color:isEnd?'#EEF2F7':col,
      fillColor:isEnd?(i===0?sc:ec):'#07111F',fillOpacity:1,weight:isEnd?2:1.5
    }).addTo(map);
    const yr=Math.round(s.year);
    c.bindTooltip(`${s.name}（${fmtYear(yr)}）`,{permanent:false});
    stMarkers.push(c);
  });
  map.fitBounds(routeLine.getBounds(),{padding:[50,50]});
  // ポリライン上の補完インデックスを構築
  buildPolyIndex(ll);

  document.getElementById('ovProgBar').style.background=col;
  const sl=document.getElementById('ageSlider');
  sl.min=0;sl.max=Math.round(scaleMode==='human'?lifeSpan*12:lifeSpan);sl.value=0;
  document.getElementById('mapOverlay').style.display='';
  document.getElementById('hr2').style.display='';
  document.getElementById('stationListSection').style.display='';
  document.getElementById('saveSection').style.display='';
  buildStationList(getStartVal(),getEndVal());
  redrawTopicMarkers();
  onSlider(0);
  setStatus(`${stations.length}駅 ／ ${Math.round(totalDist)}km の人生ネ！`,false);
}

function clearMap(){
  if(routeLine){map.removeLayer(routeLine);routeLine=null;}
  stMarkers.forEach(m=>map.removeLayer(m));stMarkers=[];
  if(currentMarker){map.removeLayer(currentMarker);currentMarker=null;}
  topicMarkers.forEach(e=>{try{map.removeLayer(e.marker||e);}catch(e){}});topicMarkers=[];
}

// ===== スライダー =====
function monthToAgeStr(months){
  const y=Math.floor(months/12);
  const m=months%12;
  return `${y}歳`;
}
function monthToYear(months, birthYear){
  return birthYear + months/12;
}

function onSlider(months){
  if(isDragging)return;
  months=parseInt(months);
  const birthYear=getStartVal();   // 西れき年（実数）
  const deathYear=getEndVal();
  const lifeSpan=deathYear-birthYear; // 年単位
  const totalSteps=Math.round(scaleMode==='human'?lifeSpan*12:lifeSpan);
  const ratio=months/totalSteps;
  const curYearReal=stepsToYear(months,birthYear); // 西れき年（実数）

  document.getElementById('ageSlider').value=months;
  document.getElementById('ovAge').textContent=valToAgeLabel(months);
  document.getElementById('ovYear').textContent=valToLabel(curYearReal);
  document.getElementById('ovProgBar').style.width=(ratio*100)+'%';

  const pos=getPosAtRatio(ratio);
  const s=stations[pos.ni],sn=stations[pos.ni+1]||s;
  const near=dist({lat:pos.lat,lon:pos.lon},s)<dist({lat:pos.lat,lon:pos.lon},sn)?s:sn;
  const nd=dist({lat:pos.lat,lon:pos.lon},near);
  document.getElementById('ovStation').textContent=near.name+' 駅';
  document.getElementById('ovSub').textContent=
    `${fmtYear(Math.round(near.year))} ／ ${Math.round(nd*10)/10}km ／ ${Math.round(ratio*100)}%`;

  // マーカ描画
  if(currentMarker)map.removeLayer(currentMarker);
  const col=selectedRoute?selectedRoute.color:'#F5A623';
  const size=32;
  const icon=L.divIcon({className:'',
    html:`<div class="age-marker-wrap" id="dragHandle">
      <div class="age-marker-circle" style="width:${size}px;height:${size}px;background:${col};font-size:13px;font-weight:bold;text-align:center;line-height:1.1">${valToAgeLabel(months)}</div>
      <div class="age-marker-label">${valToLabel(curYearReal)}</div>
    </div>`,
    iconSize:[size,size+18],iconAnchor:[size/2,size/2]});
  currentMarker=L.marker([pos.lat,pos.lon],{icon,zIndexOffset:1000,draggable:true}).addTo(map);

  // 追尾モード：地図を丸の位置にすぐ寄せる（ズームは変えない）
  if(followMode) map.panTo([pos.lat,pos.lon],{animate:false});

  // ドラッグ中も路線上にスナップさせルヨ
  currentMarker.on('drag',function(e){
    isDragging=true;
    const {lat,lng}=e.latlng;
    const r=latLonToRatio(lat,lng);
    // 路線上の正しい座標に強制スナップ
    const snappedPos=getPosAtRatio(r);
    currentMarker.setLatLng([snappedPos.lat,snappedPos.lon]);
    const lifeSpan2=getEndVal()-getStartVal();
    const totalSteps2=Math.round(scaleMode==='human'?lifeSpan2*12:lifeSpan2);
    const newSteps=Math.round(r*totalSteps2);
    document.getElementById('ageSlider').value=newSteps;
    document.getElementById('ovAge').textContent=valToAgeLabel(newSteps);
    document.getElementById('ovYear').textContent=valToLabel(stepsToYear(newSteps,getStartVal()));
    document.getElementById('ovProgBar').style.width=(r*100)+'%';
    // 丸アイコンもリアルタイム更新（DOMを直接書きかえてドラッグを邪魔しない）
    const el=currentMarker.getElement();
    if(el){
      const circle=el.querySelector('.age-marker-circle');
      const label=el.querySelector('.age-marker-label');
      if(circle) circle.textContent=valToAgeLabel(newSteps);
      if(label)  label.textContent=valToLabel(stepsToYear(newSteps,getStartVal()));
    }
    // 近い駅も更新スル
    const s=stations[snappedPos.ni],sn2=stations[snappedPos.ni+1]||s;
    const near=dist({lat:snappedPos.lat,lon:snappedPos.lon},s)<dist({lat:snappedPos.lat,lon:snappedPos.lon},sn2)?s:sn2;
    document.getElementById('ovStation').textContent=near.name+' 駅';
    highlightList(near.name);
  });
  currentMarker.on('dragend',function(){
    isDragging=false;
    onSlider(parseInt(document.getElementById('ageSlider').value));
  });

  // トピック表示（常時表示OFFのとき、丸が近くを通ったら出す）
  if(!bubbleVisible){
    // 「ピッタリ同じ年」だと地球スケールで丸が拾えないので、総期間の約1%を窓にする
    const span=Math.abs(getEndVal()-getStartVal())||1;
    const win=Math.max(0.5, span/100);   // この範囲(年)に入っていれば表示
    const matching=topics.filter(t=>Math.abs(topicYearVal(t)-curYearReal)<=win);
    if(matching.length){
      const txt=matching.map(t=>`<span style="color:#F5A623">${fmtTopicLabel(t)}</span> ${t.text}`).join('<br>');
      if(isPlaying){
        // 再生中はdivで表示（openPopupを使わない）
        const el=document.getElementById('passingComment');
        el.innerHTML=txt;
        el.style.display='block';
        clearTimeout(window._popupTimer);
        window._popupTimer=setTimeout(()=>{el.style.display='none';},2000);
      } else if(currentMarker){
        // 手動操作時はポップアップ
        currentMarker.bindPopup(txt,{maxWidth:240,autoClose:false,autoPan:false}).openPopup();
      }
    }
  }

  highlightList(near.name);
}

function buildStationList(birthYear,deathYear){
  const list=document.getElementById('stationList');list.innerHTML='';
  stations.forEach(s=>{
    const yr=Math.round(s.year);
    const birthYearReal2=scaleMode==='human'?birthYear/12:birthYear;
    const ageVal=scaleMode==='human'
      ? (()=>{const d=Math.round((s.year-birthYearReal2)*12);const y=Math.floor(d/12);return y+'歳';})()
      : fmtBigNum(yr-Math.round(birthYearReal2))+'年';
    const el=document.createElement('div');
    el.className='sli';el.dataset.name=s.name;
    el.innerHTML=`<div class="sli-dot"></div><span style="flex:1">${s.name}</span>
      <span class="sli-yr">${scaleMode==='human'?fmtYear(yr):valToLabel(yr)}(${ageVal})</span>`;
    const steps=yearToSteps(s.year, birthYear);
    el.onclick=()=>{document.getElementById('ageSlider').value=steps;onSlider(steps);};
    list.appendChild(el);
  });
}
function highlightList(name){
  document.querySelectorAll('.sli').forEach(el=>el.classList.toggle('cur',el.dataset.name===name));
}

// ===== アニメ =====
function toggleAnim(){isPlaying?stopAnim():startAnim();}
function startAnim(){
  isPlaying=true;
  document.getElementById('btnPlay').textContent='⏸';
  document.getElementById('btnPlay').classList.add('active');
  const sl=document.getElementById('ageSlider');
  const maxV=parseInt(sl.max);
  // 速度スライダ(1〜10) → 全体の再生時間(180秒〜10秒)。stepSizeとintervalを毎回算出（途中変更も即反映）
  function params(){
    const val=parseInt(document.getElementById('speedSlider').value);
    const D=10+(10-val)/9*170;          // 秒：val1→180秒(おそ), val10→10秒(はや)
    const BASE=40;                       // ms（なめらか基準＝約25fps）
    const wantTicks=D*1000/BASE;
    if(maxV>=wantTicks) return {step:Math.max(1,Math.round(maxV/wantTicks)), interval:BASE};
    return {step:1, interval:Math.max(BASE, Math.round(D*1000/maxV))}; // 短い人生はstep=1で間隔を伸ばす
  }
  function step(){
    if(!isPlaying)return;
    const p=params();
    let v=parseInt(sl.value)+p.step;
    if(v>=maxV){ onSlider(maxV); stopAnim(); return; } // 最後（現在）まで来たら止める
    onSlider(v);
    animTimer=setTimeout(step,p.interval);
  }
  animTimer=setTimeout(step,params().interval);
}
function stopAnim(){
  isPlaying=false;clearTimeout(animTimer);
  document.getElementById('btnPlay').textContent='▶ 再生';
  document.getElementById('btnPlay').classList.remove('active');
}
function resetAnim(){stopAnim();onSlider(0);}

// ===== JSON 保存・読みこみ =====
// 共有データを組み立てる（JSON保存・URL共有で共通）
function buildShareData(){
  return {
    version:'2.55',
    routeId:selectedRoute?selectedRoute.id:null,
    startSel:document.getElementById('startSel').value,
    endSel:document.getElementById('endSel').value,
    reversed,
    birthYear:getStartVal(),
    deathYear:getEndVal(),
    birthYearRaw:parseInt(document.getElementById('birthYear').value),
    birthMonthRaw:parseInt(document.getElementById('birthMonth').value)||1,
    deathYearRaw:parseInt(document.getElementById('deathYear').value),
    deathMonthRaw:parseInt(document.getElementById('deathMonth').value)||1,
    scaleMode,
    dateMode,
    bigYearJp,
    topics,
    currentMonth:parseInt(document.getElementById('ageSlider').value),
  };
}

function saveJSON(){
  const data=buildShareData();
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  const now=new Date();
  const ts=[
    now.getFullYear(),
    String(now.getMonth()+1).padStart(2,'0'),
    String(now.getDate()).padStart(2,'0'),
    String(now.getHours()).padStart(2,'0'),
    String(now.getMinutes()).padStart(2,'0'),
    String(now.getSeconds()).padStart(2,'0')
  ].join('');
  a.download='timescale_'+ts+'.json';
  a.click();
  setStatus('JSONファイルを保存したヨ！',false);
}

function resetAll(){
  if(!confirm('全てリセットしますか？')) return;
  stopAnim();   // 再生中なら止める
  clearMap();
  // 路線選択解除
  selectedRoute=null;
  document.querySelectorAll('.route-btn').forEach(b=>{b.classList.remove('sel');b.style.borderColor='';b.style.color='';});
  // 始発・終着をクリア
  document.getElementById('startSel').innerHTML='';
  document.getElementById('endSel').innerHTML='';
  // 年をデフォルトに
  document.getElementById('birthYear').value='1900';
  document.getElementById('deathYear').value='1980';
  document.getElementById('birthMonth').value='1';
  document.getElementById('deathMonth').value='1';
  // トピッククリア
  topics=[];
  renderTopicList();
  // 吹き出し最前面の記憶もリセット
  topicTopZ=1000; for(const k in topicZOrder) delete topicZOrder[k];
  // スケール・表記・追尾をデフォルトに戻す
  scaleMode='human';
  document.querySelectorAll('#scaleHuman,#scaleEarth').forEach(b=>b.classList.remove('active'));
  const sh=document.getElementById('scaleHuman'); if(sh)sh.classList.add('active');
  dateMode='seireki';
  document.querySelectorAll('#warekiBtns .wr-btn').forEach((b,i)=>b.classList.toggle('active', i===0));
  bigYearJp=false;
  const bp=document.getElementById('bigFmtPlain'), bj=document.getElementById('bigFmtJp');
  if(bp&&bj){ bp.classList.add('active'); bj.classList.remove('active'); }
  followMode=false;
  const bf=document.getElementById('btnFollow'); if(bf){ bf.classList.remove('active'); bf.textContent='🎯 追尾'; }
  bubbleSide='top';
  const bsb=document.getElementById('bubbleSideBtn'); if(bsb)bsb.textContent='↕ 上下';
  // セクション・駅一覧・下部バーを非表示＆クリア（最初の状態に戻す）
  ['terminalSection','yearSection','warekiSection','topicSection','drawSection','stationListSection','saveSection','hr2','mapOverlay'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.style.display='none';
  });
  const stList=document.getElementById('stationList');
  if(stList) stList.innerHTML='';
  // 下部スライダのラベルも初期化
  const sl=document.getElementById('ageSlider'); if(sl){ sl.value=0; sl.max=100; }
  const setTxt=(id,v)=>{const e=document.getElementById(id); if(e)e.textContent=v;};
  setTxt('ovAge','0'); setTxt('ovYear','──'); setTxt('ovStation','──'); setTxt('ovSub','');
  const pb=document.getElementById('ovProgBar'); if(pb) pb.style.width='0%';
  setStatus('リセットしたヨ！',false);
}

// データを画面に反映（JSONよみこみ・URL共有よみこみで共通）
function applyData(data,doneMsg){
  // 路線を選ぶ
  const route=SHINKANSEN.find(r=>r.id===data.routeId);
  if(!route){setStatus('この路線データは見つからなかたヨ',true);return;}
  const allBtns=document.querySelectorAll('.route-btn');
  const routeIdx=SHINKANSEN.findIndex(r=>r.id===data.routeId);
  selectRoute(route,allBtns[routeIdx]);
  // 値を復元
  setTimeout(()=>{
    document.getElementById('startSel').value=data.startSel;
    document.getElementById('endSel').value=data.endSel;
    document.getElementById('birthYear').value=data.birthYearRaw||data.birthYear;
    document.getElementById('deathYear').value=data.deathYearRaw||data.deathYear;
    if(data.birthMonthRaw){document.getElementById('birthMonth').value=data.birthMonthRaw;}
    if(data.deathMonthRaw){document.getElementById('deathMonth').value=data.deathMonthRaw;}
    if(data.scaleMode){
      scaleMode=data.scaleMode;
      const scaleBtn=document.getElementById(data.scaleMode==='earth'?'scaleEarth':'scaleHuman');
      if(scaleBtn)setScale(data.scaleMode,scaleBtn);
    }
    if(data.reversed!==reversed)swapTerminals();
    topics=data.topics||[];
    // 元号ボタン（人スケール）復元：warekiBtns内だけを対象にする
    dateMode = (scaleMode==='earth') ? 'seireki' : (data.dateMode||'seireki');
    const dModes=['seireki','wareki','both'];
    document.querySelectorAll('#warekiBtns .wr-btn').forEach((b,i)=>{
      b.classList.toggle('active', dModes[i]===dateMode);
    });
    // 表示形式トグル（地球スケール）復元
    bigYearJp = !!data.bigYearJp;
    const bp=document.getElementById('bigFmtPlain'), bj=document.getElementById('bigFmtJp');
    if(bp&&bj){ bp.classList.toggle('active',!bigYearJp); bj.classList.toggle('active',bigYearJp); }
    renderTopicList();
    drawLife();   // 初回描画（このとき地図がズームするので一瞬グニャっとなる）
    // 地図のズームが落ち着いてから、もう一度きれいに描き直す＝「タイムスケールを表示」を自動で押すのと同じ
    setTimeout(()=>{
      drawLife();
      if(data.currentMonth!=null){
        const sl=document.getElementById('ageSlider');
        sl.value=data.currentMonth;
        onSlider(data.currentMonth);   // スライダ位置を復元（drawLifeが0に戻すので最後に）
      }
    },400);
    setStatus(doneMsg||'読みこんだヨ！',false);
  },50);
}

function loadJSON(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      applyData(data,'JSONを読みこんだヨ！');
    }catch(err){
      setStatus('JSONのよみこみに失敗したヨ：'+err.message,true);
    }
  };
  reader.readAsText(file);
  event.target.value='';
}

// ===== URLで共有 =====
function shareURL(){
  if(!selectedRoute){setStatus('まず路線をえらんでネ！それから共有ダヨ',true);return;}
  try{
    const data=buildShareData();
    const enc=LZString.compressToEncodedURIComponent(JSON.stringify(data));
    const url=location.origin+location.pathname+'#d='+enc;
    const warn=url.length>2000?'（※'+url.length+'文字。長いから一部サービスで切れるかも。心配ならJSON保存もどうぞ）':'';
    const ok=()=>setStatus('🔗 共有URLをコピーしたヨ！'+warn+' はりつけて おくってネ',false);
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(url).then(ok).catch(()=>{window.prompt('このURLをコピーして共有してネ：',url);});
    }else{
      window.prompt('このURLをコピーして共有してネ：',url);
    }
  }catch(err){
    setStatus('共有URLづくりに失敗したヨ：'+err.message,true);
  }
}

// ===== URLハッシュから復元（ページひらいた時） =====
function loadFromHash(){
  const h=location.hash||'';
  if(h.indexOf('#d=')!==0)return;
  try{
    const enc=h.slice(3);
    const json=LZString.decompressFromEncodedURIComponent(enc);
    if(!json){setStatus('共有URLのデータが読めなかたヨ',true);return;}
    const data=JSON.parse(json);
    applyData(data,'🔗 共有データを読みこんだヨ！');
  }catch(err){
    setStatus('共有URLのよみこみに失敗したヨ：'+err.message,true);
  }
}

function setStatus(msg,isErr){
  const el=document.getElementById('statusMsg');
  el.textContent=msg;el.className='status-msg'+(isErr?' err':'');
}

buildRouteList();
buildMonthSelects();

// URLハッシュに共有データがあれば復元（地図は構築済み）
loadFromHash();
